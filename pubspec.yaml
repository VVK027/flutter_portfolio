name: vivek_portfolio
description: "Vivek's Portfolio with Flutter Web"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.0
  go_router: ^14.0.0
  scrollable_positioned_list: ^0.3.8
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.0
  custom_lint: ^0.8.1
  freezed: ^3.2.3
  json_serializable: ^6.9.0

flutter:
  uses-material-design: true
  assets:
    - assets/data.json
analyzer:
  plugins:
    - custom_lint
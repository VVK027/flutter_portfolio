name: 🛠 Flutter CI / Build Web

on:
  push:
    branches: [ main ]
    tags:    [ 'v*.*.*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write   # allow creating/updating Releases & uploading assets
  actions:  read    # allow pulling marketplace actions

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_release:
    runs-on: ubuntu-latest

    steps:
      - name: 📂 Checkout code
        uses: actions/checkout@v4

      - name: 🚀 Cache pub deps
        uses: actions/cache@v3
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.yaml') }}
          restore-keys: ${{ runner.os }}-pub-

      - name: ☕️ Setup Java (Temurin 17)
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: '17'

      - name: 🦋 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.35.3

      - name: 📥 Check Flutter Version
        run: flutter --version

      - name: 📥 Get dependencies
        run: flutter pub get

      - name: 📥 Build Runner
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: ✅ Analyze the Dart code
        run: flutter analyze

      - name: ✅ Run tests
        run:  flutter test --no-pub --coverage

      - name: ✅ Build web (release)
        run: flutter build web --release

      - name: 🚀 Deploy to VK027/VK027 repo
        id: deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          personal_token: ${{secrets.DEPLOY_TOKEN}}
          publish_dir: ./build/web
          external_repository: VK027/VK027
          publish_branch: main

      - name: 🌍 Show Deployed URL
        run: |
          echo "### ✅ Deployed successfully!" >> $GITHUB_STEP_SUMMARY
          echo "🔗 **Live URL:** https://${{github.VK027}}.github.io/" >> $GITHUB_STEP_SUMMARY
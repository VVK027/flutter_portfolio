name: vivek_portfolio
description: Portfolio website for Vivek Kumar (Flutter Web)
version: 1.0.0+1
environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.0
  go_router: ^14.0.0
  scrollable_positioned_list: ^0.3.8
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.0
  freezed: ^2.5.0
  json_serializable: ^6.9.0

flutter:
  uses-material-design: true
  assets:
    - assets/data.json

name: vivek_portfolio
description: "Vivek's Portfolio with Flutter Web"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^17.2.2
  scrollable_positioned_list: ^0.3.8
  json_annotation: ^4.11.0
  url_launcher: ^6.3.2
  font_awesome_flutter: ^10.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.14.0
  flutter_lints: ^6.0.0
  json_serializable: ^6.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/data.json
    - assets/profile.jpeg
analyzer:
  plugins:
    - flutter_lints